<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&amp;display=swap');
      .logo-text {
        font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 900;
        fill: #1a1f4e; /* Navy theme color of Caravage */
        text-anchor: middle;
      }
      .medai {
        font-size: 36px;
        letter-spacing: -0.01em;
      }
      .nex {
        font-size: 36px;
        letter-spacing: -0.0332em;
      }
    </style>
  </defs>
  <!-- Centered typographic logo mimicking the 0.8em line-height and style -->
  <text x="140" y="36" class="logo-text medai">MedAI</text>
  <text x="140" y="74" class="logo-text nex">Nex</text>
</svg>
